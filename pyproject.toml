[project]
name = "casanovoutils"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { email = "gwenneth.straub@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "fire>=0.7.1",
    "matplotlib>=3.10.7",
    "numpy>=1.26.4",
    "pandas>=2.3.3",
    "polars>=1.35.2",
    "pyteomics>=4.7.5",
    "pyyaml>=6.0.3",
    "tqdm>=4.67.1",
]

[project.scripts]
casanovo-utils = "casanovoutils:main"
mgf-utils = "casanovoutils.mgfutils:main"
downsample-ms = "casanovoutils.downsample:main"
graph-prec-cov = "casanovoutils.preccov:main"
charge-distribution = "casanovoutils.mgf_visualization:charge_distribution_main"
fragment-coverage = "casanovoutils.mgf_visualization:fragment_coverage_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "black>=25.11.0",
    "isort>=7.0.0",
    "pytest>=9.0.2",
]
